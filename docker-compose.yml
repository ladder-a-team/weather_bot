# WeatherBet — bot and dashboard running side by side.
#
# Both services share the same built image and the same `data/` volume,
# so the bot writes market JSONs and the dashboard watches them live.
#
# Start everything:
#     docker compose up -d --build
#
# Watch the bot log:
#     docker compose logs -f bot
#
# Dashboard:
#     http://localhost:8050
#
# To stop:
#     docker compose down

services:
  bot:
    build: .
    image: weatherbet:latest
    container_name: weatherbet-bot
    command: ["python", "-u", "bot_v2.py"]
    volumes:
      # Persist bot state (markets, state.json, calibration) on the host.
      - ./data:/app/data
      # Override the in-image config.json without rebuilding.
      - ./config.json:/app/config.json:ro
    restart: unless-stopped

  dashboard:
    # Reuse the image built by the `bot` service — do NOT add `build:` here,
    # otherwise `docker compose build` would race to tag the same name twice.
    image: weatherbet:latest
    container_name: weatherbet-dashboard
    command: ["python", "-u", "dashboard.py", "--host", "0.0.0.0", "--port", "8050"]
    ports:
      - "8050:8050"
    volumes:
      - ./data:/app/data
      - ./config.json:/app/config.json:ro
    restart: unless-stopped
    depends_on:
      - bot
    healthcheck:
      # `python -c ...` avoids having to add curl/wget to the image.
      test:
        - CMD
        - python
        - -c
        - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8050/api/state').status == 200 else 1)"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
